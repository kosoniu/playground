spring:
  application:
    name: playground
  output:
    ansi:
      enabled: ALWAYS

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level) %clr(%logger{36}){cyan} %clr(-){faint} %msg%n"

couchbase:
  connection-string: ${COUCHBASE_CONNECTION_STRING}
  username: ${COUCHBASE_USERNAME}
  password: ${COUCHBASE_PASSWORD}
  bucket-name: ${COUCHBASE_BUCKET_NAME}